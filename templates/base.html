<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackRebel</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/style.css') }}">
    {% if display_map|default(true) %}
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    {% endif %}
</head>
<body>
    <div class="shell">
        <header class="hero-panel">
        <div class="rebel-mark">TR</div>
        <div>
            <p class="eyebrow">TRACK REBEL</p>
            <h1>Track the resistance of the Irish People.</h1>
        </div>
        </header>

        <nav class="nav-row">
        <a href="/">Home</a>
        {% if logged_in %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
        {% endif %}
        </nav>

        <main class="content">
        {% block content %}{% endblock %}
        </main>

        <footer class="footer-bar">
        <p>Built for the Irish People.</p>
        </footer>
    </div>
</body>
</html>
